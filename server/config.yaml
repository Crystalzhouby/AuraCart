# ---- 数据库 ----
database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "123456"
  dbname: "ecommerce"
  vector_dim: 1024
  pool_size: 8
  max_overflow: 5

# ---- Embedding (OpenAI 兼容) ----
embedding:
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: ""  # 请在 .secrets.yaml 中设置
  model: "text-embedding-v4"
  batch_size: 10

# ---- 大模型 (OpenAI 兼容) ----
llm:
  base_url: "https://ark.cn-beijing.volces.com/api/v3/"
  api_key: ""  # 请在 .secrets.yaml 中设置
  model: "ep-20260514111645-lmgt2"
  temperature: 0.3

# ---- 检索 ----
search:
  rrf_k: 60
  # 新分段检索参数
  semantic_top_k: 25
  keyword_top_k: 25
  rrf_semantic_weight: 0.7
  rrf_keyword_weight: 0.3
  rrf_top_k: 25
  rerank_top_k: 5
  max_reviews_per_product: 5
  max_chunks_per_product: 5
  memory_recent_rounds: 10
  # 不变参数
  max_match_texts_per_product: 3
  max_match_chars_per_product: 500
  source_weights:
    marketing: 1.0
    faq: 1.0
    user_review: 0.7
    property: 1.0
  reasoning_max_chars: 100
  max_category_concurrency: 5
  max_batch_ids: 20
  memory_max_tokens: 2000

# ---- 日志 ----
log:
  level: "INFO"
  dir: "log"

# ---- 同步 ----
sync:
  interval_s: 2
  enabled: true

# ---- 数据集 ----
dataset:
  dir: "data/ecommerce_agent_dataset_"

# ---- 超时 (秒) ----
timeout:
  query_parse: 30.0
  retrieval: 1.0
  generation: 60.0
  rerank: 5.0
  total_request: 300.0

# ---- 精排模型 ----
reranker:
  base_url: "https://api.siliconflow.cn/v1"
  api_key: ""  # 请在 .secrets.yaml 中设置，或通过 RERANKER_API_KEY 环境变量
  model: "BAAI/bge-reranker-v2-m3"
  timeout: 5.0

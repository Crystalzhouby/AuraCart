services:
  postgres:
    build:
      context: ./server/scripts
      dockerfile: Dockerfile
    container_name: pg17-vector-zhparser
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: auracart-server
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - AURACART_CONFIG=/app/config.yaml
      - AURACART_LOG_LEVEL=INFO
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./server/config.yaml:/app/config.yaml:ro
      - ./server/log:/app/log
      - ./ecommerce_agent_dataset:/app/ecommerce_agent_dataset:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  pgdata:
